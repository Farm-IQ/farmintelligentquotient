<!-- ============================================================================
     AGENT FOOTER NAVIGATION - Bottom Navigation Bar
     Router Links to All Agent Features
     ============================================================================ -->

<nav class="agent-footer-nav">
  <ul class="nav-list">
    <!-- Dashboard -->
    <li class="nav-item" [class.active]="isActive('/agent')">
      <a routerLink="/agent" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="home-outline"></ion-icon>
        </div>
        <span class="nav-text">Dashboard</span>
      </a>
    </li>

    <!-- Verification -->
    <li class="nav-item" [class.active]="isActive('/agent/verification')">
      <a routerLink="/agent/verification" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </div>
        <span class="nav-text">Verification</span>
      </a>
    </li>

    <!-- Reports -->
    <li class="nav-item" [class.active]="isActive('/agent/reports')">
      <a routerLink="/agent/reports" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="document-text-outline"></ion-icon>
        </div>
        <span class="nav-text">Reports</span>
      </a>
    </li>

    <!-- Wallet -->
    <li class="nav-item" [class.active]="isActive('/agent/wallet')">
      <a routerLink="/agent/wallet" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="wallet-outline"></ion-icon>
        </div>
        <span class="nav-text">Wallet</span>
      </a>
    </li>

    <!-- Settings -->
    <li class="nav-item" [class.active]="isActive('/agent/settings')">
      <a routerLink="/agent/settings" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="settings-outline"></ion-icon>
        </div>
        <span class="nav-text">Settings</span>
      </a>
    </li>
  </ul>
</nav>
