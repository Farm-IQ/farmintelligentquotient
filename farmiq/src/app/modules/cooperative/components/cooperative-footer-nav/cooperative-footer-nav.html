<!-- ============================================================================
     COOPERATIVE FOOTER NAVIGATION - Bottom Navigation Bar
     Router Links to All Cooperative Features
     ============================================================================ -->

<nav class="cooperative-footer-nav">
  <ul class="nav-list">
    <!-- Dashboard -->
    <li class="nav-item" [class.active]="isActive('/cooperative')">
      <a routerLink="/cooperative" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="home-outline"></ion-icon>
        </div>
        <span class="nav-text">Dashboard</span>
      </a>
    </li>

    <!-- Member Management -->
    <li class="nav-item" [class.active]="isActive('/cooperative/members')">
      <a routerLink="/cooperative/members" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="people-outline"></ion-icon>
        </div>
        <span class="nav-text">Members</span>
      </a>
    </li>

    <!-- Finances -->
    <li class="nav-item" [class.active]="isActive('/cooperative/finances')">
      <a routerLink="/cooperative/finances" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="wallet-outline"></ion-icon>
        </div>
        <span class="nav-text">Finances</span>
      </a>
    </li>

    <!-- Insights -->
    <li class="nav-item" [class.active]="isActive('/cooperative/insights')">
      <a routerLink="/cooperative/insights" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="analytics-outline"></ion-icon>
        </div>
        <span class="nav-text">Insights</span>
      </a>
    </li>

    <!-- Settings -->
    <li class="nav-item" [class.active]="isActive('/cooperative/settings')">
      <a routerLink="/cooperative/settings" routerLinkActive="active" class="nav-link">
        <div class="nav-icon-wrapper">
          <ion-icon name="settings-outline"></ion-icon>
        </div>
        <span class="nav-text">Settings</span>
      </a>
    </li>
  </ul>
</nav>
